# GearCargo — Synology NAS Deployment (Single-Image, RECOMMENDED)
#
# Ready-to-use for Synology DSM — pulls the all-in-one image from GHCR, no build.
# Differences from docker-compose.deploy.yml:
#   - APP_PORT defaults to 5050 (DSM uses 5000/5001)
#   - No deploy/resource limits (Synology kernels lack the CPU CFS scheduler)
#
# One container runs PostgreSQL 16 + Redis 7 + gunicorn + backups under
# s6-overlay. It starts as root (PID 1) and drops each service to its own
# unprivileged user, fixing volume ownership automatically — so no PUID/PGID
# juggling is needed as with the old 4-container setup.
#
# Quick Start:
#   1. cp .env.single.example .env   &&   nano .env   (set ALL secrets, APP_PORT=5050)
#   2. mkdir -p secrets && nano secrets/vapid_private_key
#   3. sudo docker compose -f docker-compose.synology.yml up -d
#   4. sudo docker compose -f docker-compose.synology.yml logs -f
#
# Migrating from the old 4-container stack? See README "Migrating to the single
# container" — scripts/migrate-to-single.sh does it safely with auto-rollback.

services:
  gearcargo:
    image: ghcr.io/aiulian25/gearcargo:latest
    container_name: gearcargo
    ports:
      - "${APP_PORT:-5050}:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://gearcargo:${DB_PASSWORD}@127.0.0.1:5432/gearcargo
      - REDIS_URL=redis://:${REDIS_PASSWORD}@127.0.0.1:6379/0
      - RATELIMIT_STORAGE_URL=redis://:${REDIS_PASSWORD}@127.0.0.1:6379/1
      - PG_SHARED_BUFFERS=${PG_SHARED_BUFFERS:-256MB}
      - PG_MAX_CONNECTIONS=${PG_MAX_CONNECTIONS:-100}
      - REDIS_MAXMEMORY=${REDIS_MAXMEMORY:-128mb}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      - BACKUP_ENABLED=${BACKUP_ENABLED:-true}
      - BACKUP_KEEP_LAST=${BACKUP_KEEP_LAST:-7}

      - SECRET_KEY=${SECRET_KEY}
      - APP_URL=${APP_URL}
      - ADMIN_DOMAIN=${ADMIN_DOMAIN:-}
      - USER_DOMAIN=${USER_DOMAIN:-}

      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRES=${JWT_ACCESS_TOKEN_EXPIRES:-3600}
      - JWT_REFRESH_TOKEN_EXPIRES=${JWT_REFRESH_TOKEN_EXPIRES:-2592000}

      - CORS_ORIGINS=${CORS_ORIGINS}
      - CORS_SUPPORTS_CREDENTIALS=true

      - WTF_CSRF_ENABLED=true
      - WTF_CSRF_SECRET_KEY=${WTF_CSRF_SECRET_KEY}

      - RATELIMIT_ENABLED=true
      - RATELIMIT_DEFAULT=${RATELIMIT_DEFAULT:-100 per hour}

      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_HTTPONLY=true
      - SESSION_COOKIE_SAMESITE=Strict

      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-60}
      - OLLAMA_MODEL_PREDICT=${OLLAMA_MODEL_PREDICT:-}
      - OLLAMA_MODEL_OCR=${OLLAMA_MODEL_OCR:-}
      - OLLAMA_MODEL_ANOMALY=${OLLAMA_MODEL_ANOMALY:-}
      - OLLAMA_MODEL_REMINDER=${OLLAMA_MODEL_REMINDER:-}

      - DEFAULT_THEME=${DEFAULT_THEME:-dark}
      - APP_NAME=${APP_NAME:-GearCargo}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-200}

      - MAIL_ENABLED=${MAIL_ENABLED:-true}
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER}

      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}

      - GEOIP_DB_PATH=${GEOIP_DB_PATH:-}
      - TRUSTED_PROXY_COUNT=${TRUSTED_PROXY_COUNT:-1}

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - KILL
    tmpfs:
      - /tmp
    secrets:
      - vapid_private_key
    volumes:
      - ./volumes/pgdata:/var/lib/postgresql/data
      - ./volumes/redis:/data
      - ./volumes/attachments:/app/volumes/attachments
      - ./volumes/backups:/app/volumes/backups
      - ./volumes/uploads:/app/uploads
      - ./volumes/logs:/app/volumes/logs
      - ./volumes/geoip:/app/volumes/geoip:ro
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    # No deploy/resource limits — Synology kernels lack the CPU CFS scheduler.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

secrets:
  vapid_private_key:
    file: ./secrets/vapid_private_key
