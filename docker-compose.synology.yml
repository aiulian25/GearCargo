# GearCargo - Synology NAS Deployment
# Version: 1.0
#
# Ready-to-use for Synology DSM — no manual edits needed!
# Differences from the standard deploy file:
#   - user: reads PUID/PGID from .env (default 1026:100)
#   - No deploy/resource limits (Synology kernels lack CPU CFS scheduler)
#   - APP_PORT defaults to 5050 (DSM uses 5000/5001)
#
# Quick Start:
#   1. Copy .env.synology to .env and configure all values
#   2. Login to GitHub Container Registry:
#      echo "YOUR_GITHUB_PAT" | sudo docker login ghcr.io -u YOUR_USERNAME --password-stdin
#   3. Deploy:
#      sudo docker compose up -d
#   4. View logs:
#      sudo docker compose logs -f backend

services:
  # ============================================================
  # BACKEND API (Pre-built from GitHub Container Registry)
  # ============================================================
  backend:
    image: ghcr.io/aiulian25/gearcargo:latest
    container_name: gearcargo-backend
    ports:
      - "${APP_PORT:-5050}:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://gearcargo:${DB_PASSWORD}@db:5432/gearcargo
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - APP_URL=${APP_URL}

      # Security - JWT
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRES=${JWT_ACCESS_TOKEN_EXPIRES:-3600}
      - JWT_REFRESH_TOKEN_EXPIRES=${JWT_REFRESH_TOKEN_EXPIRES:-2592000}

      # Security - CORS
      - CORS_ORIGINS=${CORS_ORIGINS}
      - CORS_SUPPORTS_CREDENTIALS=true

      # Security - CSRF Protection
      - WTF_CSRF_ENABLED=true
      - WTF_CSRF_SECRET_KEY=${WTF_CSRF_SECRET_KEY}

      # Security - Rate Limiting
      - RATELIMIT_ENABLED=true
      - RATELIMIT_DEFAULT=${RATELIMIT_DEFAULT:-100 per hour}
      - RATELIMIT_STORAGE_URL=redis://:${REDIS_PASSWORD}@redis:6379/1

      # Security - Session
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - SESSION_COOKIE_HTTPONLY=true
      - SESSION_COOKIE_SAMESITE=${SESSION_COOKIE_SAMESITE:-Lax}

      # Encryption Key
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

      # Admin User (optional - for first deployment)
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}

      # Domain-based access control (SECURITY)
      - ADMIN_DOMAIN=${ADMIN_DOMAIN:-}
      - USER_DOMAIN=${USER_DOMAIN:-}

      # Ollama AI (optional)
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-30}

      # Theme
      - DEFAULT_THEME=${DEFAULT_THEME:-dark}

      # Upload limit (MB)
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-200}

      # Email (for password reset, notifications)
      - MAIL_ENABLED=${MAIL_ENABLED:-false}
      - MAIL_SERVER=${MAIL_SERVER:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-}

      # Push Notifications
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-}
    volumes:
      - ./volumes/attachments:/app/volumes/attachments
      - ./volumes/backups:/app/volumes/backups
      - ./volumes/uploads:/app/uploads
      - ./volumes/logs:/app/volumes/logs
    user: "${PUID:-1026}:${PGID:-100}"
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gearcargo-net

  # ============================================================
  # POSTGRESQL DATABASE
  # ============================================================
  db:
    image: postgres:16-alpine
    container_name: gearcargo-db
    environment:
      - POSTGRES_USER=gearcargo
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=gearcargo
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /tmp
      - /run/postgresql
    volumes:
      - ./volumes/db:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gearcargo -d gearcargo"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gearcargo-net

  # ============================================================
  # REDIS CACHE/SESSIONS
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: gearcargo-redis
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - ./volumes/redis:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - gearcargo-net

networks:
  gearcargo-net:
    driver: bridge
    name: gearcargo-network
