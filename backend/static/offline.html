<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - GearCargo</title>
  <!--
    S14: Styles extracted to external file so 'unsafe-inline' is not required in
    the CSP style-src directive. Workbox precaches offline.css alongside offline.html
    (both match globPatterns: '**/*.{css,html}') so styles are available when offline.
  -->
  <link rel="stylesheet" href="/offline.css" />
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4s1.79-4 4-4h.71C7.37 7.69 9.48 6 12 6c3.04 0 5.5 2.46 5.5 5.5v.5H19c1.66 0 3 1.34 3 3s-1.34 3-3 3z"/>
        <path d="M12 10h-1v4h1v-4zm0 5h-1v1h1v-1z" fill="none"/>
        <line x1="4" y1="4" x2="20" y2="20" stroke="#64748b" stroke-width="2"/>
      </svg>
    </div>
    <h1 id="offline-title">You're offline</h1>
    <p id="offline-body">Check your internet connection and try again. Some features may still be available offline.</p>
    <button id="offline-btn" onclick="window.location.reload()">Try Again</button>
  </div>

  <!--
    I16: Inline i18n — runs synchronously before any network request.
    Reads the same localStorage key that LanguageContext.jsx uses ('language'),
    falls back to navigator.language, then defaults to English.
    No external dependencies: must work when the network is completely unavailable.
  -->
  <script>
    (function () {
      var T = {
        en: {
          title: "You're offline",
          body: "Check your internet connection and try again. Some features may still be available offline.",
          btn: "Try Again"
        },
        ro: {
          title: "E\u0219ti offline",
          body: "Verific\u0103 conexiunea la internet \u0219i \u00eencearc\u0103 din nou. Unele func\u021bii pot fi disponibile \u0219i offline.",
          btn: "\u00cencearc\u0103 din nou"
        },
        es: {
          title: "Est\u00e1s sin conexi\u00f3n",
          body: "Comprueba tu conexi\u00f3n a internet e int\u00e9ntalo de nuevo. Algunas funciones pueden estar disponibles sin conexi\u00f3n.",
          btn: "Reintentar"
        }
      };
      var lang = 'en';
      try { lang = localStorage.getItem('language') || lang; } catch (_) {}
      if (!T[lang]) {
        lang = (navigator.language || 'en').slice(0, 2).toLowerCase();
      }
      var t = T[lang] || T['en'];
      document.getElementById('offline-title').textContent = t.title;
      document.getElementById('offline-body').textContent = t.body;
      document.getElementById('offline-btn').textContent = t.btn;
      document.title = t.title + ' \u2014 GearCargo';
      document.documentElement.lang = lang;
    })();
  </script>
</body>
</html>
