<!DOCTYPE html>
<html lang="en">
  <head>
    <!--
      I13: FOUC prevention — apply saved theme class before any stylesheet or
      React code runs. The browser reads localStorage synchronously here, so
      <html class="light"> is set before the first paint when the user prefers
      the light theme. Dark is the CSS default so no class is needed for dark.
      The SHA-256 hash of this script is allowlisted in the backend CSP
      (script-src) so 'unsafe-inline' is NOT required.
    -->
    <script>(function(){var t=localStorage.getItem('theme');if(t==='light'||(!t&&window.matchMedia('(prefers-color-scheme: light)').matches)){document.documentElement.classList.add('light')}})()</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1e293b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GearCargo" />
    
    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/logo-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/logo-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/logo-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/logo-180.png" />
    
    <!-- Splash Screens for iOS -->
    <link rel="apple-touch-startup-image" href="/icons/splash-640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icons/splash-1242x2208.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    
    <title>GearCargo - Vehicle Management</title>
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!--
      S14: Pre-React loader styles extracted to external file so 'unsafe-inline' can
      be removed from the CSP style-src directive. Served from 'self' (no unsafe-inline
      needed). Workbox precaches this file (css matches globPatterns) so it is
      available instantly and during offline use.
    -->
    <link rel="stylesheet" href="/loader.css" />
  </head>
  <body>
    <div id="root">
      <!-- Loading state before React hydrates -->
      <div id="app-loader">
        <img src="/icons/logo-192.png" alt="GearCargo" />
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
