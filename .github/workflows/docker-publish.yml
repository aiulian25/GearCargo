name: Publish image

# Build the app container and push it to GitHub Container Registry (GHCR) so
# end users PULL a ready image (Synology/PC/mini-PC/server) — they never build.
# Multi-arch (amd64 + arm64) so the same `:latest` tag works on any hardware;
# Docker auto-selects the right arch from the manifest.
#
# Triggers: every push to main (publishes :latest + the commit SHA), version
# tags v* (publishes the semver tags), and manual dispatch.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

# One in-flight publish per ref; newer pushes cancel older builds.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push (amd64 + arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU enables the arm64 cross-build on the amd64 runner.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercase, matches the existing package ghcr.io/aiulian25/gearcargo.
          images: ghcr.io/${{ github.repository_owner }}/gearcargo
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Single-image / all-in-one variant (PostgreSQL 16 + Redis 7 + gunicorn + cron
  # under s6-overlay). Published under distinct `single*` tags so existing
  # 4-container `:latest` installs are unaffected. Same multi-arch matrix.
  publish-single:
    name: Build & push single-image (amd64 + arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags (single)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gearcargo
          tags: |
            type=raw,value=single,enable={{is_default_branch}}
            type=sha,prefix=single-,format=short
            type=semver,pattern=single-{{version}}

      - name: Build and push (single)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.single
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Separate cache scope so the two images don't evict each other.
          cache-from: type=gha,scope=single
          cache-to: type=gha,mode=max,scope=single
