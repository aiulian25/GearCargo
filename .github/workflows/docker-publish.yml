name: Publish image

# Build the single all-in-one image and push it to GitHub Container Registry
# (GHCR) so end users PULL a ready image (Synology/PC/mini-PC/server) — they
# never build. Multi-arch (amd64 + arm64) so the same `:latest` tag works on any
# hardware; Docker auto-selects the right arch from the manifest.
#
# Triggers: every push to main (publishes :latest + :single + the commit SHA),
# version tags v* (semver tags), and manual dispatch.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

# One in-flight publish per ref; newer pushes cancel older builds.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push single image (amd64 + arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # QEMU enables the arm64 cross-build on the amd64 runner.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercase, matches the package ghcr.io/aiulian25/gearcargo.
          images: ghcr.io/${{ github.repository_owner }}/gearcargo
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=single,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.single
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
