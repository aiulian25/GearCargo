# GearCargo - Dependabot configuration (S13, IMPROVEMENTS.md §1.6)
#
# Opens automated PRs for dependency updates and surfaces vulnerable versions.
# Minor/patch bumps are grouped to reduce PR noise; major bumps come as
# individual PRs so breaking changes are reviewed deliberately.
version: 2
updates:
  # ---- Backend Python dependencies ----
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "deps(backend)"
    groups:
      backend-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ---- Frontend npm dependencies ----
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "deps(frontend)"
    groups:
      frontend-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ---- Dockerfile base image ----
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "deps(docker)"

  # ---- GitHub Actions used in our workflows ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "deps(ci)"
