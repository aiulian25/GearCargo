# GearCargo — the standard deployment (single image, pre-built, no build)
#
# The easiest way to run GearCargo. Pulls the ready all-in-one image from GHCR —
# one container running PostgreSQL 16 + Redis 7 + gunicorn + scheduled backups
# under s6-overlay. Only the app port is published; PostgreSQL and Redis bind to
# 127.0.0.1 INSIDE the container and are never network-exposed.
#
# Fastest path:   ./setup.sh          (generates secrets, creates dirs, starts)
#
# Manual:
#   1. cp .env.example .env   &&   nano .env          (fill APP_URL + secrets)
#   2. mkdir -p secrets && nano secrets/vapid_private_key
#   3. docker compose up -d      &&   docker compose logs -f
#
# Update:  docker compose pull   &&   docker compose up -d
#
# Synology / custom port: set APP_PORT in .env (e.g. 5050) — no separate file.
# Migrating from the old 4-container stack? See README "Migrating to the single
# container" (scripts/migrate-to-single.sh — safe, auto-rollback).
# Want to build locally instead of pull? Use docker-compose.single.yml.
# Prefer strict app/DB/Redis isolation? See examples/docker-compose.4container.yml
# (the 4-container image is published as ghcr.io/aiulian25/gearcargo:multi).

services:
  gearcargo:
    image: ghcr.io/aiulian25/gearcargo:latest
    container_name: gearcargo
    ports:
      # APP_BIND_IP defaults to all interfaces. If a reverse proxy runs on THIS
      # host, set APP_BIND_IP=127.0.0.1 in .env so the app isn't reachable in
      # plaintext from the network (SECURITY_ASSESSMENT.md D2). setup.sh offers this.
      - "${APP_BIND_IP:-0.0.0.0}:${APP_PORT:-5000}:5000"
    environment:
      - FLASK_ENV=production
      # Embedded datastores on loopback. Point these at an external host to run
      # in dual-mode (the embedded PG/Redis then stay dormant).
      - DATABASE_URL=postgresql://gearcargo:${DB_PASSWORD}@127.0.0.1:5432/gearcargo
      - REDIS_URL=redis://:${REDIS_PASSWORD}@127.0.0.1:6379/0
      - RATELIMIT_STORAGE_URL=redis://:${REDIS_PASSWORD}@127.0.0.1:6379/1
      # Embedded server tuning
      - PG_SHARED_BUFFERS=${PG_SHARED_BUFFERS:-256MB}
      - PG_MAX_CONNECTIONS=${PG_MAX_CONNECTIONS:-100}
      - REDIS_MAXMEMORY=${REDIS_MAXMEMORY:-128mb}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      # In-container scheduled backups
      - BACKUP_ENABLED=${BACKUP_ENABLED:-true}
      - BACKUP_KEEP_LAST=${BACKUP_KEEP_LAST:-7}

      - SECRET_KEY=${SECRET_KEY}
      - APP_URL=${APP_URL}
      - ADMIN_DOMAIN=${ADMIN_DOMAIN:-}
      - USER_DOMAIN=${USER_DOMAIN:-}

      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRES=${JWT_ACCESS_TOKEN_EXPIRES:-3600}
      - JWT_REFRESH_TOKEN_EXPIRES=${JWT_REFRESH_TOKEN_EXPIRES:-2592000}

      - CORS_ORIGINS=${CORS_ORIGINS}
      - CORS_SUPPORTS_CREDENTIALS=true

      - WTF_CSRF_ENABLED=true
      - WTF_CSRF_SECRET_KEY=${WTF_CSRF_SECRET_KEY}

      - RATELIMIT_ENABLED=true
      - RATELIMIT_DEFAULT=${RATELIMIT_DEFAULT:-100 per hour}

      # HTTPS required in production (put a reverse proxy in front for TLS)
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_HTTPONLY=true
      - SESSION_COOKIE_SAMESITE=Strict

      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-60}
      - OLLAMA_MODEL_PREDICT=${OLLAMA_MODEL_PREDICT:-}
      - OLLAMA_MODEL_OCR=${OLLAMA_MODEL_OCR:-}
      - OLLAMA_MODEL_ANOMALY=${OLLAMA_MODEL_ANOMALY:-}
      - OLLAMA_MODEL_REMINDER=${OLLAMA_MODEL_REMINDER:-}

      - DEFAULT_THEME=${DEFAULT_THEME:-dark}
      - APP_NAME=${APP_NAME:-GearCargo}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-200}

      - MAIL_ENABLED=${MAIL_ENABLED:-true}
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER}

      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}

      - GEOIP_DB_PATH=${GEOIP_DB_PATH:-}
      - TRUSTED_PROXY_COUNT=${TRUSTED_PROXY_COUNT:-1}

    # s6-overlay must start as root (PID 1) to supervise and drop each service to
    # its own unprivileged user (postgres/redis/gearcargo).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - KILL
    tmpfs:
      # /run stays on the writable layer (s6 execs from /run/s6; Docker tmpfs is noexec).
      - /tmp
    secrets:
      - vapid_private_key
    volumes:
      # Embedded PostgreSQL data (kept separate from any 4-container ./volumes/db)
      - ./volumes/pgdata:/var/lib/postgresql/data
      - ./volumes/redis:/data
      - ./volumes/attachments:/app/volumes/attachments
      - ./volumes/backups:/app/volumes/backups
      - ./volumes/uploads:/app/uploads
      - ./volumes/logs:/app/volumes/logs
      - ./volumes/geoip:/app/volumes/geoip:ro
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    # No hard resource limits by default — keeps this file portable across hosts
    # (Synology kernels lack the CPU CFS scheduler). To cap resources, copy the
    # `deploy.resources` block from examples/docker-compose.4container.yml.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"

secrets:
  vapid_private_key:
    file: ./secrets/vapid_private_key
