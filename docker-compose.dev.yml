# GearCargo — DEV / build-from-source compose (single all-in-one image)
#
# Use this when you're developing GearCargo or want to build the image locally
# instead of pulling it. End users should use docker-compose.yml (pulls the
# ready image). This builds the SAME single image (PostgreSQL 16 + Redis 7 +
# gunicorn + backup-cron under s6-overlay); only :5000 is published and the
# datastores bind to 127.0.0.1 inside the container.
#
# Usage:
#   1. Copy .env.example to .env and set the secrets (reuse your EXISTING
#      ENCRYPTION_KEY / SECRET_KEY / JWT_SECRET_KEY when migrating!).
#   2. Build + start: docker compose -f docker-compose.dev.yml up -d --build
#
# Migrating from the 4-container stack? Use scripts/migrate-to-single.sh — it
# backs up first, loads your data into the embedded PG, verifies row counts, and
# auto-rolls back on failure. The embedded PG uses ./volumes/pgdata, so your old
# ./volumes/db is left untouched for instant rollback.

services:
  gearcargo:
    build:
      context: .
      dockerfile: Dockerfile
    image: gearcargo:dev
    container_name: gearcargo
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      - FLASK_ENV=production
      # Embedded datastores on loopback. Point these at an external host to run
      # in dual-mode (the embedded PG/Redis then stay dormant).
      - DATABASE_URL=postgresql://gearcargo:${DB_PASSWORD}@127.0.0.1:5432/gearcargo
      - REDIS_URL=redis://:${REDIS_PASSWORD}@127.0.0.1:6379/0
      - RATELIMIT_STORAGE_URL=redis://:${REDIS_PASSWORD}@127.0.0.1:6379/1
      # Embedded server tuning (single container runs everything — see §10).
      - PG_SHARED_BUFFERS=${PG_SHARED_BUFFERS:-256MB}
      - PG_MAX_CONNECTIONS=${PG_MAX_CONNECTIONS:-100}
      - REDIS_MAXMEMORY=${REDIS_MAXMEMORY:-128mb}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      # In-container scheduled backups (set false to disable / back up externally)
      - BACKUP_ENABLED=${BACKUP_ENABLED:-true}
      - BACKUP_KEEP_LAST=${BACKUP_KEEP_LAST:-7}

      - SECRET_KEY=${SECRET_KEY}
      - APP_URL=${APP_URL}
      - ADMIN_DOMAIN=${ADMIN_DOMAIN:-}
      - USER_DOMAIN=${USER_DOMAIN:-}

      # Security - JWT
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRES=${JWT_ACCESS_TOKEN_EXPIRES:-3600}
      - JWT_REFRESH_TOKEN_EXPIRES=${JWT_REFRESH_TOKEN_EXPIRES:-2592000}

      # Security - CORS
      - CORS_ORIGINS=${CORS_ORIGINS}
      - CORS_SUPPORTS_CREDENTIALS=true

      # Security - CSRF
      - WTF_CSRF_ENABLED=true
      - WTF_CSRF_SECRET_KEY=${WTF_CSRF_SECRET_KEY}

      # Security - Rate limiting
      - RATELIMIT_ENABLED=true
      - RATELIMIT_DEFAULT=${RATELIMIT_DEFAULT:-100 per hour}

      # Security - Session (HTTPS required in production)
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_HTTPONLY=true
      - SESSION_COOKIE_SAMESITE=Strict

      # Encryption key — MUST match the key your data was written with.
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

      # Ollama AI (optional)
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-60}
      - OLLAMA_MODEL_PREDICT=${OLLAMA_MODEL_PREDICT:-}
      - OLLAMA_MODEL_OCR=${OLLAMA_MODEL_OCR:-}
      - OLLAMA_MODEL_ANOMALY=${OLLAMA_MODEL_ANOMALY:-}
      - OLLAMA_MODEL_REMINDER=${OLLAMA_MODEL_REMINDER:-}

      - DEFAULT_THEME=${DEFAULT_THEME:-dark}
      - APP_NAME=${APP_NAME:-GearCargo}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-200}

      # Email
      - MAIL_ENABLED=${MAIL_ENABLED:-true}
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER}

      # Push notifications (private key is a Docker secret, see below)
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}

      - GEOIP_DB_PATH=${GEOIP_DB_PATH:-}
      - TRUSTED_PROXY_COUNT=${TRUSTED_PROXY_COUNT:-1}

    # NOTE: no `user:` — s6-overlay must start as root (PID 1) to reap zombies,
    # forward signals, and drop each service to its own unprivileged user
    # (postgres/redis/gearcargo) via s6-setuidgid.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Minimal set: fix mount ownership + drop privileges per service.
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - KILL
    tmpfs:
      # NOTE: /run is intentionally NOT a tmpfs — Docker mounts tmpfs with
      # noexec, but s6-overlay execs its supervisor from /run/s6. Leaving /run on
      # the writable container layer (exec allowed) is required for s6 to start.
      - /tmp
    secrets:
      - vapid_private_key
    volumes:
      # Embedded PostgreSQL — SEPARATE dir so the 4-container ./volumes/db stays
      # untouched for rollback. Do NOT point this at an old alpine data dir.
      - ./volumes/pgdata:/var/lib/postgresql/data
      # Embedded Redis (ephemeral — sessions/rate-limit/cache)
      - ./volumes/redis:/data
      # Durable app data — same mounts as the 4-container stack
      - ./volumes/attachments:/app/volumes/attachments
      - ./volumes/backups:/app/volumes/backups
      - ./volumes/uploads:/app/uploads
      - ./volumes/logs:/app/volumes/logs
      - ./volumes/geoip:/app/volumes/geoip:ro
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    deploy:
      resources:
        limits:
          # One container now runs PG + Redis + gunicorn + cron
          cpus: '3'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"

# ============================================================
# DOCKER SECRETS — VAPID private key as a file (not an env var)
# ============================================================
secrets:
  vapid_private_key:
    file: ./secrets/vapid_private_key
