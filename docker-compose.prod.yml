# GearCargo - Production Docker Compose Configuration
# Version: 1.0
#
# Usage:
#   1. Copy .env.production to .env and configure all values
#   2. Build image: docker compose -f docker-compose.prod.yml build
#   3. Start:       docker compose -f docker-compose.prod.yml up -d
#   4. Logs:        docker compose -f docker-compose.prod.yml logs -f
#
# For updates:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d --force-recreate

services:
  # ============================================================
  # BACKEND API + STATIC FILE SERVER (Production)
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: gearcargo:latest
    container_name: gearcargo-backend
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://gearcargo:${DB_PASSWORD}@db:5432/gearcargo
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - APP_URL=${APP_URL}
      
      # Domain-based access control (SECURITY)
      - ADMIN_DOMAIN=${ADMIN_DOMAIN:-}
      - USER_DOMAIN=${USER_DOMAIN:-}
      
      # Security - JWT
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRES=${JWT_ACCESS_TOKEN_EXPIRES:-3600}
      - JWT_REFRESH_TOKEN_EXPIRES=${JWT_REFRESH_TOKEN_EXPIRES:-2592000}
      
      # Security - CORS
      - CORS_ORIGINS=${CORS_ORIGINS}
      - CORS_SUPPORTS_CREDENTIALS=true
      
      # Security - CSRF Protection
      - WTF_CSRF_ENABLED=true
      - WTF_CSRF_SECRET_KEY=${WTF_CSRF_SECRET_KEY}
      
      # Security - Rate Limiting
      - RATELIMIT_ENABLED=true
      - RATELIMIT_DEFAULT=${RATELIMIT_DEFAULT:-100 per hour}
      - RATELIMIT_STORAGE_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      
      # Security - Session (HTTPS required in production)
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_HTTPONLY=true
      - SESSION_COOKIE_SAMESITE=Strict
      
      # Encryption Key
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      
      # Ollama AI (optional)
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-30}
      
      # Theme
      - DEFAULT_THEME=${DEFAULT_THEME:-dark}
      
      # App name (used in backup filenames)
      - APP_NAME=${APP_NAME:-GearCargo}
      
      # Upload limit (MB)
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-200}
      
      # Email (Required for password reset, notifications)
      - MAIL_ENABLED=${MAIL_ENABLED:-true}
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER}
      
      # Push Notifications
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    user: "${PUID:-1000}:${PGID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./volumes/attachments:/app/volumes/attachments
      - ./volumes/backups:/app/volumes/backups
      - ./volumes/uploads:/app/uploads
      - ./volumes/logs:/app/volumes/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gearcargo-net

  # ============================================================
  # POSTGRESQL DATABASE (Production)
  # ============================================================
  db:
    image: postgres:16-alpine
    container_name: gearcargo-db
    environment:
      - POSTGRES_USER=gearcargo
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=gearcargo
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /tmp
      - /run/postgresql
    volumes:
      - ./volumes/db:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gearcargo -d gearcargo"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gearcargo-net

  # ============================================================
  # REDIS CACHE/SESSIONS (Production)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: gearcargo-redis
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - ./volumes/redis:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - gearcargo-net

  # ============================================================
  # NGINX REVERSE PROXY (Optional - for SSL termination)
  # Uncomment if not using external reverse proxy (Cloudflare, etc.)
  # ============================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: gearcargo-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #     - ./volumes/certbot/conf:/etc/letsencrypt:ro
  #     - ./volumes/certbot/www:/var/www/certbot:ro
  #   depends_on:
  #     - backend
  #   restart: always
  #   networks:
  #     - gearcargo-net

  # ============================================================
  # AUTOMATED BACKUPS (Optional)
  # Runs daily backup at 3 AM
  # ============================================================
  # backup:
  #   image: postgres:16-alpine
  #   container_name: gearcargo-backup
  #   environment:
  #     - PGPASSWORD=${DB_PASSWORD}
  #   volumes:
  #     - ./volumes/backups/db:/backups
  #   entrypoint: |
  #     sh -c 'while true; do
  #       sleep 86400
  #       pg_dump -h db -U gearcargo gearcargo | gzip > /backups/gearcargo_$$(date +%Y%m%d_%H%M%S).sql.gz
  #       find /backups -name "*.sql.gz" -mtime +7 -delete
  #     done'
  #   depends_on:
  #     - db
  #   restart: always
  #   networks:
  #     - gearcargo-net

networks:
  gearcargo-net:
    driver: bridge
    name: gearcargo-network
