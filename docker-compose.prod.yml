# GearCargo - Production Docker Compose Configuration
# Version: 1.0
#
# Usage:
#   1. Copy .env.production to .env and configure all values
#   2. Build image: docker compose -f docker-compose.prod.yml build
#   3. Start:       docker compose -f docker-compose.prod.yml up -d
#   4. Logs:        docker compose -f docker-compose.prod.yml logs -f
#
# For updates:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d --force-recreate

services:
  # ============================================================
  # BACKEND API + STATIC FILE SERVER (Production)
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: gearcargo:latest
    container_name: gearcargo-backend
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://gearcargo:${DB_PASSWORD}@db:5432/gearcargo
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - APP_URL=${APP_URL}
      
      # Domain-based access control (SECURITY)
      - ADMIN_DOMAIN=${ADMIN_DOMAIN:-}
      - USER_DOMAIN=${USER_DOMAIN:-}
      
      # Security - JWT
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRES=${JWT_ACCESS_TOKEN_EXPIRES:-3600}
      - JWT_REFRESH_TOKEN_EXPIRES=${JWT_REFRESH_TOKEN_EXPIRES:-2592000}
      
      # Security - CORS
      - CORS_ORIGINS=${CORS_ORIGINS}
      - CORS_SUPPORTS_CREDENTIALS=true
      
      # Security - CSRF Protection
      - WTF_CSRF_ENABLED=true
      - WTF_CSRF_SECRET_KEY=${WTF_CSRF_SECRET_KEY}
      
      # Security - Rate Limiting
      - RATELIMIT_ENABLED=true
      - RATELIMIT_DEFAULT=${RATELIMIT_DEFAULT:-100 per hour}
      - RATELIMIT_STORAGE_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      
      # Security - Session (HTTPS required in production)
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_HTTPONLY=true
      - SESSION_COOKIE_SAMESITE=Strict
      
      # Encryption Key
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      
      # Ollama AI (optional)
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-30}
      
      # Theme
      - DEFAULT_THEME=${DEFAULT_THEME:-dark}
      
      # App name (used in backup filenames)
      - APP_NAME=${APP_NAME:-GearCargo}
      
      # Upload limit (MB)
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-200}
      
      # Email (Required for password reset, notifications)
      - MAIL_ENABLED=${MAIL_ENABLED:-true}
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER}
      
      # Push Notifications
      # VAPID_PUBLIC_KEY and VAPID_SUBJECT are non-sensitive — kept as env vars.
      # VAPID_PRIVATE_KEY is mounted as a Docker secret (see 'secrets:' below)
      # so it does NOT appear in `docker inspect` or /proc/<pid>/environ.
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
      
      # Worker count — capped to fit the 1G container memory limit
      # (host cpu_count * 2 + 1 would OOM-kill workers on many-core hosts)
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}

      # S10: Local GeoIP2 database (optional).
      # Set to the container path of a MaxMind GeoLite2-City MMDB file.
      # When unset, suspicious-login country detection is disabled but login
      # continues normally. Download free: https://dev.maxmind.com/geoip/geolite2-free-geolocation-data
      - GEOIP_DB_PATH=${GEOIP_DB_PATH:-}
      # S11: Number of trusted reverse proxies in front of the app.
      # ProxyFix peels exactly this many hops from X-Forwarded-For to set request.remote_addr.
      #   0 — direct-bind (no proxy); 1 — one proxy (nginx/Traefik/Cloudflare); 2 — CDN + proxy.
      # Clients cannot spoof their IP by prepending entries to the left of XFF.
      - TRUSTED_PROXY_COUNT=${TRUSTED_PROXY_COUNT:-1}
    user: "${PUID:-1000}:${PGID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    secrets:
      - vapid_private_key
    volumes:
      - ./volumes/attachments:/app/volumes/attachments
      - ./volumes/backups:/app/volumes/backups
      - ./volumes/uploads:/app/uploads
      - ./volumes/logs:/app/volumes/logs
      # Optional: mount GeoLite2 database for suspicious-login detection (S10).
      # Place GeoLite2-City.mmdb in ./volumes/geoip/ and set
      # GEOIP_DB_PATH=/app/volumes/geoip/GeoLite2-City.mmdb in your .env file.
      - ./volumes/geoip:/app/volumes/geoip:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gearcargo-net

  # ============================================================
  # POSTGRESQL DATABASE (Production)
  # ============================================================
  db:
    image: postgres:16-alpine
    container_name: gearcargo-db
    environment:
      - POSTGRES_USER=gearcargo
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=gearcargo
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /tmp
      - /run/postgresql
    volumes:
      - ./volumes/db:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gearcargo -d gearcargo"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gearcargo-net

  # ============================================================
  # REDIS CACHE/SESSIONS (Production)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: gearcargo-redis
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - ./volumes/redis:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - gearcargo-net

  # ============================================================
  # NGINX REVERSE PROXY (Optional - for SSL termination)
  # Uncomment if not using external reverse proxy (Cloudflare, etc.)
  # ============================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: gearcargo-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #     - ./volumes/certbot/conf:/etc/letsencrypt:ro
  #     - ./volumes/certbot/www:/var/www/certbot:ro
  #   depends_on:
  #     - backend
  #   restart: always
  #   networks:
  #     - gearcargo-net

  # ============================================================
  # AUTOMATED BACKUPS (I14)
  # Runs pg_dump + attachments/uploads archive on a cron schedule.
  # Archives land in ./volumes/backups/system/{daily,weekly}/ and
  # are compatible with restore.sh and the in-app Backup page.
  #
  # Schedule (UTC):
  #   Daily  — every day at 03:00
  #   Weekly — every Sunday at 03:30
  #
  # Tune retention: set BACKUP_KEEP_LAST in your .env (default: 7).
  # Run a one-off manual backup:
  #   docker compose -f docker-compose.prod.yml exec backup \
  #       sh /usr/local/bin/backup.sh manual
  # ============================================================
  backup:
    image: postgres:16-alpine
    container_name: gearcargo-backup
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      # PGPASSWORD is the standard libpq env var — pg_dump picks it up automatically.
      - PGPASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_USER=gearcargo
      - DB_NAME=gearcargo
      - KEEP_LAST=${BACKUP_KEEP_LAST:-7}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./volumes/backups/system:/backups
      - ./volumes/attachments:/attachments:ro
      - ./volumes/uploads:/uploads:ro
      - ./scripts/docker-backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /tmp/crontabs
        printf '0 3 * * * sh /usr/local/bin/backup.sh daily\n30 3 * * 0 sh /usr/local/bin/backup.sh weekly\n' \
            > /tmp/crontabs/root
        echo "[backup] Scheduler ready — daily 03:00, weekly (Sun) 03:30 UTC"
        exec crond -c /tmp/crontabs -f -L /dev/stdout
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - gearcargo-net

networks:
  gearcargo-net:
    driver: bridge
    name: gearcargo-network

# ============================================================
# DOCKER SECRETS
# I06: VAPID private key stored as a file secret instead of an
# environment variable, so it is not exposed in `docker inspect`.
#
# Setup: echo 'YOUR_VAPID_PRIVATE_KEY' > secrets/vapid_private_key
#        chmod 600 secrets/vapid_private_key
# (see secrets/vapid_private_key.example for the expected format)
# ============================================================
secrets:
  vapid_private_key:
    file: ./secrets/vapid_private_key
